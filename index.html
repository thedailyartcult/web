<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Art Cult</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #fff; color: #1a1a1a; }
  
  .app { display: flex; flex-direction: column; height: 100vh; }
  header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
  header h1 { font-family: 'Cormorant', serif; font-weight: 300; font-size: 1.8rem; letter-spacing: 0.3em; }
  header p { font-size: 0.55rem; letter-spacing: 0.3em; color: #aaa; margin-top: 5px; }
  
  .game { display: flex; flex: 1; min-height: 0; }
  .painting-area { flex: 2; display: flex; align-items: center; justify-content: center; background: #fafafa; border-right: 1px solid #eee; position: relative; }
  .painting-area canvas { max-width: 100%; max-height: calc(100vh - 100px); object-fit: contain; }
  .loading-overlay { position: absolute; background: rgba(250,250,250,0.9); display: flex; align-items: center; justify-content: center; inset: 0; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: #888; z-index: 5; }
  
  .choices-area { width: 320px; padding: 30px 20px; display: flex; flex-direction: column; }
  .streak { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid #ccc; background: #fff; transition: all 0.2s; }
  .dot.filled { background: #1a1a1a; border-color: #1a1a1a; }
  
  .prompt { text-align: center; font-size: 0.55rem; letter-spacing: 0.2em; color: #999; margin-bottom: 25px; text-transform: uppercase; }
  
  .choices { display: flex; flex-direction: column; gap: 12px; flex: 1; justify-content: center; }
  .choice-btn { width: 100%; padding: 14px; border: 1px solid #ddd; background: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .choice-btn:hover:not(:disabled) { border-color: #1a1a1a; background: #f5f5f5; }
  .choice-btn.correct { border-color: #2a7a4a; background: #e8f5ed; color: #2a7a4a; }
  .choice-btn.wrong { border-color: #c44; background: #fee; color: #c44; }
  .choice-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  
  .collections { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
  .collections p { font-size: 0.5rem; letter-spacing: 0.2em; color: #aaa; text-align: center; margin-bottom: 10px; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .chip { font-size: 0.45rem; letter-spacing: 0.1em; padding: 6px 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
  .chip.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  
  .popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
  .popup.show { display: flex; }
  .popup-card { background: #fff; max-width: 380px; width: 90%; text-align: center; padding: 30px; }
  .popup-card h2 { font-family: 'Cormorant', serif; font-weight: 300; font-size: 1.5rem; margin-bottom: 15px; }
  .popup-card p { font-size: 0.75rem; color: #666; margin-bottom: 20px; line-height: 1.6; }
  .popup-card button { padding: 12px 30px; border: 1px solid #1a1a1a; background: #fff; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 0.2em; transition: all 0.2s; }
  .popup-card button:hover { background: #1a1a1a; color: #fff; }
  
  .error-message { color: #c44; text-align: center; padding: 20px; font-size: 0.7rem; }
  
  @media (max-width: 700px) {
    .game { flex-direction: column; }
    .painting-area { min-height: 300px; border-right: none; border-bottom: 1px solid #eee; }
    .choices-area { width: 100%; padding: 20px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>The Daily Art Cult</h1>
    <p>Where art becomes ritual</p>
  </header>
  
  <div class="game">
    <div class="painting-area" id="paintingArea">
      <canvas id="mainCanvas"></canvas>
      <div id="loadingOverlay" class="loading-overlay" style="display: none;">Loading masterpiece...</div>
    </div>
    
    <div class="choices-area">
      <div class="streak" id="streakContainer"></div>
      <div class="prompt">Who painted this?</div>
      <div class="choices" id="choicesContainer"></div>
      
      <div class="collections">
        <p>FILTER BY COLLECTION</p>
        <div class="chip-group" id="collectionChips"></div>
      </div>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-card">
    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
    <button onclick="closePopup()">Continue</button>
  </div>
</div>

<script>
// ========== ANTI-CHEAT ==========
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(e.key)) || (e.ctrlKey && e.key === 'u')) {
    e.preventDefault();
  }
});

// ========== PAINTERS MASTER LIST (embedded) ==========
// This is the ONLY data file. Add more painters here to expand.
// Each painter needs: id, name, category (Wikimedia Commons category), tags, nationality, born, died
const PAINTERS_MASTER = [
  // POPULAR
  { id: "claude-monet", name: "Claude Monet", category: "Paintings_by_Claude_Monet", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1840, died: 1926 },
  { id: "vincent-van-gogh", name: "Vincent van Gogh", category: "Paintings_by_Vincent_van_Gogh", tags: ["popular", "impressionist"], nationality: "Dutch", born: 1853, died: 1890 },
  { id: "pablo-picasso", name: "Pablo Picasso", category: "Paintings_by_Pablo_Picasso", tags: ["popular"], nationality: "Spanish", born: 1881, died: 1973 },
  { id: "rembrandt", name: "Rembrandt van Rijn", category: "Paintings_by_Rembrandt_van_Rijn", tags: ["popular"], nationality: "Dutch", born: 1606, died: 1669 },
  { id: "johannes-vermeer", name: "Johannes Vermeer", category: "Paintings_by_Johannes_Vermeer", tags: ["popular"], nationality: "Dutch", born: 1632, died: 1675 },
  { id: "edouard-manet", name: "Édouard Manet", category: "Paintings_by_Édouard_Manet", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1832, died: 1883 },
  { id: "paul-cezanne", name: "Paul Cézanne", category: "Paintings_by_Paul_Cézanne", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1839, died: 1906 },
  { id: "pierre-renoir", name: "Pierre-Auguste Renoir", category: "Paintings_by_Pierre-Auguste_Renoir", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1841, died: 1919 },
  { id: "francisco-goya", name: "Francisco de Goya", category: "Paintings_by_Francisco_de_Goya", tags: ["popular", "realist"], nationality: "Spanish", born: 1746, died: 1828 },
  { id: "eugene-delacroix", name: "Eugène Delacroix", category: "Paintings_by_Eugène_Delacroix", tags: ["popular", "french"], nationality: "French", born: 1798, died: 1863 },
  { id: "sandro-botticelli", name: "Sandro Botticelli", category: "Paintings_by_Sandro_Botticelli", tags: ["popular", "renaissance"], nationality: "Italian", born: 1445, died: 1510 },
  { id: "leonardo-da-vinci", name: "Leonardo da Vinci", category: "Paintings_by_Leonardo_da_Vinci", tags: ["popular", "renaissance"], nationality: "Italian", born: 1452, died: 1519 },
  { id: "michelangelo", name: "Michelangelo", category: "Paintings_by_Michelangelo", tags: ["popular", "renaissance"], nationality: "Italian", born: 1475, died: 1564 },
  { id: "raphael", name: "Raphael", category: "Paintings_by_Raphael", tags: ["popular", "renaissance"], nationality: "Italian", born: 1483, died: 1520 },
  { id: "caravaggio", name: "Caravaggio", category: "Paintings_by_Caravaggio", tags: ["popular"], nationality: "Italian", born: 1571, died: 1610 },
  { id: "diego-velazquez", name: "Diego Velázquez", category: "Paintings_by_Diego_Velázquez", tags: ["popular"], nationality: "Spanish", born: 1599, died: 1660 },
  
  // FRENCH
  { id: "camille-pissarro", name: "Camille Pissarro", category: "Paintings_by_Camille_Pissarro", tags: ["french", "impressionist"], nationality: "French", born: 1830, died: 1903 },
  { id: "alfred-sisley", name: "Alfred Sisley", category: "Paintings_by_Alfred_Sisley", tags: ["french", "impressionist"], nationality: "French", born: 1839, died: 1899 },
  { id: "berthe-morisot", name: "Berthe Morisot", category: "Paintings_by_Berthe_Morisot", tags: ["french", "impressionist"], nationality: "French", born: 1841, died: 1895 },
  { id: "gustave-courbet", name: "Gustave Courbet", category: "Paintings_by_Gustave_Courbet", tags: ["french", "realist"], nationality: "French", born: 1819, died: 1877 },
  { id: "jean-millet", name: "Jean-François Millet", category: "Paintings_by_Jean-François_Millet", tags: ["french", "realist"], nationality: "French", born: 1814, died: 1875 },
  
  // RUSSIAN
  { id: "ilya-repin", name: "Ilya Repin", category: "Paintings_by_Ilya_Repin", tags: ["russian", "realist"], nationality: "Russian", born: 1844, died: 1930 },
  { id: "ivan-shishkin", name: "Ivan Shishkin", category: "Paintings_by_Ivan_Shishkin", tags: ["russian", "realist"], nationality: "Russian", born: 1832, died: 1898 },
  { id: "isaac-levitan", name: "Isaac Levitan", category: "Paintings_by_Isaac_Levitan", tags: ["russian", "impressionist"], nationality: "Russian", born: 1860, died: 1900 },
  
  // RENAISSANCE
  { id: "jan-van-eyck", name: "Jan van Eyck", category: "Paintings_by_Jan_van_Eyck", tags: ["renaissance"], nationality: "Flemish", born: 1390, died: 1441 },
  { id: "titian", name: "Titian", category: "Paintings_by_Titian", tags: ["renaissance"], nationality: "Italian", born: 1488, died: 1576 },
  { id: "el-greco", name: "El Greco", category: "Paintings_by_El_Greco", tags: ["renaissance"], nationality: "Greek", born: 1541, died: 1614 },
  
  // REALIST
  { id: "winslow-homer", name: "Winslow Homer", category: "Paintings_by_Winslow_Homer", tags: ["realist"], nationality: "American", born: 1836, died: 1910 },
  { id: "edward-hopper", name: "Edward Hopper", category: "Paintings_by_Edward_Hopper", tags: ["realist"], nationality: "American", born: 1882, died: 1967 },
  
  // EXTRA POPULAR (add more here to expand)
  { id: "gustav-klimt", name: "Gustav Klimt", category: "Paintings_by_Gustav_Klimt", tags: ["popular"], nationality: "Austrian", born: 1862, died: 1918 },
  { id: "edvard-munch", name: "Edvard Munch", category: "Paintings_by_Edvard_Munch", tags: ["popular"], nationality: "Norwegian", born: 1863, died: 1944 },
  { id: "william-turner", name: "J.M.W. Turner", category: "Paintings_by_J._M._W._Turner", tags: ["popular"], nationality: "British", born: 1775, died: 1851 },
  { id: "john-constable", name: "John Constable", category: "Paintings_by_John_Constable", tags: ["popular"], nationality: "British", born: 1776, died: 1837 }
];

// ========== GAME STATE ==========
let currentPainters = [];
let currentRoundPainter = null;
let currentPaintingUrl = null;
let currentPaintingTitle = null;
let streak = 0;
let answered = false;
let isLoading = false;

// ========== UTILITIES ==========
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildStreak() {
  const container = document.getElementById('streakContainer');
  container.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i < streak ? ' filled' : '');
    container.appendChild(dot);
  }
}

function showLoading(show) {
  const overlay = document.getElementById('loadingOverlay');
  overlay.style.display = show ? 'flex' : 'none';
  isLoading = show;
}

// ========== WIKIMEDIA API CALLS ==========
// Fetch random paintings from a painter's category
async function fetchRandomPaintings(painterCategory, limit = 20) {
  const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=categorymembers&gcmtitle=Category:${encodeURIComponent(painterCategory)}&gcmtype=file&gcmlimit=${limit}&prop=imageinfo&iiprop=url|dimensions&iiurlwidth=800&format=json&origin=*`;
  
  try {
    const response = await fetch(url);
    const data = await response.json();
    
    if (!data.query || !data.query.pages) return [];
    
    const paintings = [];
    for (const page of Object.values(data.query.pages)) {
      if (page.imageinfo && page.imageinfo[0] && page.imageinfo[0].thumburl) {
        const info = page.imageinfo[0];
        // Skip images that are too small (likely not proper paintings)
        if (info.width < 200 || info.height < 150) continue;
        
        paintings.push({
          title: page.title.replace(/^File:/, '').replace(/\.(jpg|jpeg|png)$/i, '').replace(/_/g, ' ').substring(0, 80),
          url: info.thumburl,
          width: info.width,
          height: info.height
        });
      }
    }
    return paintings;
  } catch (error) {
    console.error(`Failed to fetch paintings for ${painterCategory}:`, error);
    return [];
  }
}

// Fetch a random valid painting (with retry logic)
async function fetchValidPainting(painter) {
  for (let attempt = 0; attempt < 5; attempt++) {
    const paintings = await fetchRandomPaintings(painter.category, 30);
    if (paintings.length > 0) {
      const randomIndex = Math.floor(Math.random() * paintings.length);
      return paintings[randomIndex];
    }
    await new Promise(r => setTimeout(r, 500));
  }
  return null;
}

// ========== GAME ROUND ==========
async function nextRound() {
  if (answered || isLoading) return;
  answered = false;
  
  if (currentPainters.length < 2) {
    document.getElementById('choicesContainer').innerHTML = '<div class="error-message">Not enough painters in this collection. Try "Full" or add more painters to PAINTERS_MASTER.</div>';
    return;
  }
  
  showLoading(true);
  
  // Pick random painter for this round
  const randomIndex = Math.floor(Math.random() * currentPainters.length);
  currentRoundPainter = currentPainters[randomIndex];
  
  // Get wrong options (3 other painters)
  const otherPainters = currentPainters.filter(p => p.id !== currentRoundPainter.id);
  const wrongPainters = shuffle([...otherPainters]).slice(0, 3);
  const options = shuffle([currentRoundPainter, ...wrongPainters]);
  
  // Fetch a random painting from the selected painter
  const painting = await fetchValidPainting(currentRoundPainter);
  
  if (!painting) {
    // If failed, try a different painter
    showLoading(false);
    console.warn(`Failed to get painting for ${currentRoundPainter.name}, trying another painter`);
    setTimeout(() => nextRound(), 500);
    return;
  }
  
  currentPaintingUrl = painting.url;
  currentPaintingTitle = painting.title;
  
  // Display the painting
  await displayPainting(painting.url, painting.width, painting.height);
  
  // Display the choices
  const container = document.getElementById('choicesContainer');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.name;
    btn.onclick = () => handleAnswer(btn, opt.id === currentRoundPainter.id, opt.name);
    container.appendChild(btn);
  });
  
  showLoading(false);
}

function displayPainting(imageUrl, imgWidth, imgHeight) {
  return new Promise((resolve) => {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    img.onload = function() {
      const maxW = window.innerWidth - 340;
      const maxH = window.innerHeight - 100;
      const scale = Math.min(maxW / img.width, maxH / img.height, 1);
      
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      // Blur signature area (bottom right corner)
      const blurW = canvas.width * 0.35;
      const blurH = canvas.height * 0.2;
      const blurX = canvas.width - blurW;
      const blurY = canvas.height - blurH;
      
      ctx.save();
      for (let i = 0; i < 3; i++) {
        ctx.filter = `blur(${5 + i * 4}px)`;
        ctx.drawImage(img, blurX / scale, blurY / scale, blurW / scale, blurH / scale, blurX - i, blurY - i, blurW + i * 2, blurH + i * 2);
      }
      ctx.filter = 'none';
      ctx.restore();
      
      resolve();
    };
    
    img.onerror = function() {
      // On error, draw error state
      canvas.width = 600;
      canvas.height = 400;
      ctx.fillStyle = '#fafafa';
      ctx.fillRect(0, 0, 600, 400);
      ctx.fillStyle = '#999';
      ctx.font = '12px Montserrat';
      ctx.textAlign = 'center';
      ctx.fillText('Image failed to load. Trying again...', 300, 200);
      setTimeout(() => nextRound(), 1000);
      resolve();
    };
    
    img.src = imageUrl;
  });
}

function handleAnswer(btn, isCorrect, painterName) {
  if (answered) return;
  answered = true;
  
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);
  
  if (isCorrect) {
    btn.classList.add('correct');
    streak++;
    buildStreak();
    
    if (streak === 10) {
      showPopup(true);
    } else {
      setTimeout(() => nextRound(), 800);
    }
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.textContent === currentRoundPainter.name) b.classList.add('correct');
    });
    streak = 0;
    buildStreak();
    showPopup(false);
  }
}

function showPopup(won) {
  const popup = document.getElementById('popup');
  const title = document.getElementById('popupTitle');
  const text = document.getElementById('popupText');
  
  if (won) {
    title.textContent = '✦ 10 in a Row ✦';
    text.innerHTML = 'You correctly identified ten paintings in a row.<br>Exceptional.';
  } else {
    title.textContent = currentRoundPainter.name;
    let info = '';
    if (currentRoundPainter.nationality) info += currentRoundPainter.nationality + ' Painter';
    if (currentRoundPainter.born && currentRoundPainter.died) info += `  ·  ${currentRoundPainter.born}–${currentRoundPainter.died}`;
    if (currentPaintingTitle) info += `<br><br>“${currentPaintingTitle}”`;
    text.innerHTML = info || 'Try again!';
  }
  
  popup.classList.add('show');
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
  if (streak === 10) streak = 0;
  buildStreak();
  nextRound();
}

// ========== COLLECTION FILTER ==========
function setCollection(collection) {
  if (collection === 'full') {
    currentPainters = PAINTERS_MASTER;
  } else {
    currentPainters = PAINTERS_MASTER.filter(p => p.tags && p.tags.includes(collection));
  }
  
  streak = 0;
  buildStreak();
  nextRound();
}

// ========== INITIALIZATION ==========
function init() {
  buildStreak();
  
  // Build collection chips dynamically from available tags
  const allTags = new Set();
  PAINTERS_MASTER.forEach(p => p.tags.forEach(t => allTags.add(t)));
  const collections = ['popular', 'french', 'impressionist', 'russian', 'renaissance', 'realist', 'full'];
  
  const chipContainer = document.getElementById('collectionChips');
  collections.forEach(col => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (col === 'popular' ? ' active' : '');
    chip.textContent = col.charAt(0).toUpperCase() + col.slice(1);
    chip.onclick = () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      setCollection(col);
    };
    chipContainer.appendChild(chip);
  });
  
  // Start with popular collection
  currentPainters = PAINTERS_MASTER.filter(p => p.tags.includes('popular'));
  nextRound();
}

// Handle window resize to redraw painting
window.addEventListener('resize', () => {
  if (currentPaintingUrl) {
    const img = new Image();
    img.onload = () => displayPainting(currentPaintingUrl, img.width, img.height);
    img.src = currentPaintingUrl;
  }
});

// Start the game
init();
</script>
</body>
</html>
