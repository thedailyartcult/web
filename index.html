<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Art Cult</title>
<meta name="description" content="Can you identify the painter? The Daily Art Cult is a free daily art quiz — guess the painter from one painting, every day.">
<meta name="keywords" content="guess the painter, art quiz game, identify paintings, art history quiz">
<meta name="author" content="The Daily Art Cult">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://thedailyartcult.github.io/index.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Daily Art Cult">
<meta property="og:title" content="The Daily Art Cult — Can You Guess the Painter?">
<meta property="og:description" content="A free daily painting guessing game. One artwork. Four painters. Streaks. Collections.">
<meta property="og:url" content="https://thedailyartcult.github.io/index.html">
<meta property="og:image" content="https://thedailyartcult.github.io/og-image.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://upload.wikimedia.org">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #fafaf8; color: #1a1a1a; font-family: 'Montserrat', sans-serif; font-weight: 300; overflow: hidden; }
  #pageShell { display: flex; flex-direction: column; height: 100vh; }
  header { flex-shrink: 0; padding: 14px 24px 12px; text-align: center; border-bottom: 1px solid #e8e8e8; background: #fff; position: relative; z-index: 10; }
  .reward-badge { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.48rem; letter-spacing: 0.2em; text-transform: uppercase; background: #faf9f7; padding: 4px 10px; border-radius: 30px; color: #7a6a5a; border: 1px solid #e8e4e0; pointer-events: none; }
  .reward-badge strong { color: #c97e2a; font-weight: 400; }
  @media (max-width: 640px) { .reward-badge { display: none; } }
  #siteTitle { display: inline-flex; align-items: baseline; gap: 0.38em; font-family: 'Cormorant', serif; font-weight: 300; font-size: 1.55rem; letter-spacing: 0.32em; text-transform: uppercase; color: #111; cursor: default; user-select: none; }
  #titleSwitcher { position: relative; display: inline-block; cursor: pointer; }
  #wordArt, #wordThought { display: block; transition: opacity 0.28s ease, transform 0.28s ease; letter-spacing: 0.32em; }
  #wordThought { position: absolute; top: 0; left: 0; white-space: nowrap; opacity: 0; transform: translateY(6px); color: #7a5c3a; pointer-events: none; }
  #titleSwitcher::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 1px; background: #bbb; transform: scaleX(0); transform-origin: left; transition: transform 0.25s ease; }
  #titleSwitcher:hover::after { transform: scaleX(1); }
  #titleDropdown { position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(-6px); background: #fff; border: 1px solid #e0e0e0; min-width: 220px; opacity: 0; pointer-events: none; transition: opacity 0.22s ease, transform 0.22s ease; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  #titleSwitcher::before { content: ''; position: absolute; bottom: -8px; left: -20px; right: -20px; height: 12px; }
  #titleDropdown.open { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
  .title-option { display: block; width: 100%; padding: 14px 20px; font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase; text-align: left; background: none; border: none; cursor: pointer; color: #555; transition: background 0.15s, color 0.15s; text-decoration: none; }
  .title-option:hover { background: #f7f7f7; color: #111; }
  .title-option.active-option { color: #aaa; cursor: default; }
  .title-option .opt-label { display: block; font-size: 0.4rem; letter-spacing: 0.18em; color: #ccc; margin-top: 3px; }
  .title-option + .title-option { border-top: 1px solid #f0f0f0; }
  header p { font-size: 0.5rem; letter-spacing: 0.38em; text-transform: uppercase; color: #c0b8b0; margin-top: 4px; }
  #gameArea { flex: 1; display: flex; min-height: 0; }
  #paintingCol { flex: 1 1 60%; position: relative; background: #f5f4f0; border-right: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: center; overflow: hidden; min-width: 0; }
  #paintingCol::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1; opacity: 0.4; }
  #paintingWrap { position: relative; line-height: 0; max-width: 100%; max-height: 100%; z-index: 2; filter: drop-shadow(0 4px 24px rgba(0,0,0,0.13)); transition: filter 0.4s ease; }
  #paintingWrap:hover { filter: drop-shadow(0 8px 40px rgba(0,0,0,0.18)); }
  #paintingCanvas { display: block; max-width: 100%; max-height: calc(100vh - 72px); width: auto; height: auto; user-select: none; pointer-events: none; animation: fadeCanvas 0.5s ease; }
  @keyframes fadeCanvas { from { opacity: 0; transform: scale(0.985); } to { opacity: 1; transform: scale(1); } }
  #choicesCol { flex: 0 0 300px; display: flex; flex-direction: column; padding: 22px 18px 18px; overflow-y: auto; background: #fff; }
  #streakDots { display: flex; justify-content: center; align-items: center; gap: 7px; padding-bottom: 18px; border-bottom: 1px solid #f0ede8; margin-bottom: 18px; flex-shrink: 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; border: 1px solid #ccc; background: #fff; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .dot.filled { background: #1a1a1a; border-color: #1a1a1a; transform: scale(1.15); }
  #choicesPrompt { font-size: 0.48rem; letter-spacing: 0.32em; text-transform: uppercase; color: #c8c0b8; text-align: center; margin-bottom: 14px; flex-shrink: 0; }
  #choices { display: flex; flex-direction: column; gap: 8px; flex: 1; justify-content: center; }
  .choice-btn { position: relative; width: 100%; padding: 13px 12px 13px 36px; border: 1px solid #e0ddd8; background: #fff; font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; text-align: left; color: #1a1a1a; transition: border-color 0.18s, background 0.18s, transform 0.14s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .choice-btn .btn-num { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.42rem; letter-spacing: 0.1em; color: #ccc; }
  .choice-btn:hover:not(:disabled) { border-color: #1a1a1a; background: #faf9f7; transform: translateX(2px); }
  .choice-btn.key-flash { background: #f0ede8; border-color: #aaa; }
  .choice-btn.correct { border-color: #2d6a46; background: #f2faf5; color: #1a4030; }
  .choice-btn.correct .btn-num { color: #2d6a46; }
  .choice-btn.wrong { border-color: #8a2a2a; background: #fdf3f3; color: #5a1a1a; }
  .choice-btn:disabled { cursor: default; transform: translateX(0); }
  #keyHint { flex-shrink: 0; text-align: center; margin-top: 14px; font-size: 0.4rem; letter-spacing: 0.25em; text-transform: uppercase; color: #d8d4ce; }
  #keyHint span { display: inline-block; border: 1px solid #e8e4e0; padding: 2px 5px; margin: 0 1px; font-size: 0.38rem; }
  #collectionSwitcher { flex-shrink: 0; margin-top: 16px; padding-top: 14px; border-top: 1px solid #f0ede8; }
  #collectionSwitcher p { font-size: 0.42rem; letter-spacing: 0.3em; text-transform: uppercase; color: #ccc; text-align: center; margin-bottom: 8px; }
  #collectionBtns { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-height: 120px; overflow-y: auto; padding: 2px; }
  .col-chip { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.4rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 8px; border: 1px solid #e8e4e0; background: #fff; color: #aaa; cursor: pointer; transition: all 0.18s; }
  .col-chip:hover { border-color: #aaa; color: #555; }
  .col-chip.active { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
  /* ── HEADER TAGLINE ANIMATION ── */
  #siteTagline {
    position: relative;
    height: 1.4em;
    overflow: hidden;
    display: block;
    margin-top: 4px;
  }

  #taglineDefault, #taglinePraise {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.5rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    will-change: transform, opacity;
  }

  /* Default — visible at rest */
  #taglineDefault {
    color: #c0b8b0;
    transform: translateY(0);
    opacity: 1;
    transition: transform 0.6s cubic-bezier(0.76,0,0.24,1), opacity 0.4s ease;
  }

  /* Praise — waits below, rises on correct */
  #taglinePraise {
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: none;
    color: #c4a454;
    transform: translateY(110%);
    opacity: 0;
    transition: transform 0.65s cubic-bezier(0.22,1,0.36,1), opacity 0.45s ease;
  }

  /* State: praise visible — default exits up, praise rises in */
  #siteTagline.praise-active #taglineDefault {
    transform: translateY(-110%);
    opacity: 0;
  }
  #siteTagline.praise-active #taglinePraise {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── TITLE GLOW on correct guess ── */
  @keyframes titleCorrectGlow {
    0%   { opacity: 1; }
    18%  { opacity: 0.5; letter-spacing: 0.38em; }
    50%  { opacity: 1; letter-spacing: 0.32em; }
    100% { opacity: 1; letter-spacing: 0.32em; }
  }
  #siteTitle.correct-flash {
    animation: titleCorrectGlow 1.1s ease forwards;
  }

  /* ── CORRECT BUTTON GOLD SHIMMER ── */
  @keyframes correctShimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }

  .choice-btn.correct {
    border-color: #c4a454 !important;
    background: linear-gradient(
      90deg,
      #f2faf5 0%,
      #fdf8ec 40%,
      #f9f4e4 50%,
      #fdf8ec 60%,
      #f2faf5 100%
    );
    background-size: 200% auto;
    color: #5a4010;
    animation: correctShimmer 1.2s ease forwards;
  }

  .choice-btn.correct .btn-num { color: #c4a454; }

  /* ── OVERLAY ── */
  #overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    align-items: center; justify-content: center; padding: 24px;
    background: rgba(8,6,4,0.72);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  #overlay.show { display: flex; animation: overlayIn 0.22s ease; }
  @keyframes overlayIn { from { opacity:0; } to { opacity:1; } }

  /* Loss overlay — lighter, painting still breathes behind */
  #overlay.show.loss-overlay {
    background: rgba(8,6,4,0.5);
    backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
    align-items: flex-end;
    padding-bottom: 32px;
  }

  /* ── WRONG ANSWER SHAKE on the button ── */
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-7px); }
    40%      { transform: translateX(7px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(4px); }
  }
  .choice-btn.wrong { animation: wrongShake 0.45s ease; }

  /* ── BASE POPUP ── */
  #popup {
    background: #fff; width: 100%; max-width: 400px;
    text-align: center; overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.28);
  }

  /* Win popup — slides up from below */
  #popup.win, #popup.audiobook {
    animation: popupSlideUp 0.36s cubic-bezier(0.34,1.3,0.64,1);
  }
  @keyframes popupSlideUp {
    from { opacity:0; transform: translateY(28px) scale(0.95); }
    to   { opacity:1; transform: translateY(0)    scale(1);    }
  }

  /* ── LOSS POPUP — painting fills the top ── */
  #popup.loss {
    max-width: 460px;
    animation: popupReveal 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes popupReveal {
    from { opacity:0; transform: scale(0.9); }
    to   { opacity:1; transform: scale(1);   }
  }

  /* The painting reveal area — only shown on loss */
  #popupPaintingReveal {
    display: none;
    position: relative;
    width: 100%;
    height: 220px;
    overflow: hidden;
    background: #1a1814;
  }
  #popup.loss #popupPaintingReveal { display: block; }

  #popupPaintingImg {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s ease 0.2s;
  }
  #popupPaintingImg.loaded { opacity: 1; }

  /* Placeholder when image fails to load */
  #popupPaintingImg.error-load {
    object-fit: contain;
    background: #2a2520;
  }

  /* Gradient over painting so text below reads cleanly */
  #popupPaintingReveal::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(10,8,6,0.55) 100%);
    pointer-events: none;
  }

  /* Painter name floated over the bottom of the painting */
  #popupPaintingCaption {
    display: none;
    position: absolute;
    bottom: 14px; left: 18px; right: 18px;
    text-align: left;
    z-index: 2;
  }
  #popup.loss #popupPaintingCaption { display: block; }

  #popupPaintingCaption .caption-painter {
    font-family: 'Cormorant', serif; font-weight: 300;
    font-size: 1.3rem; letter-spacing: 0.1em;
    color: #fff; line-height: 1.1;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  }
  #popupPaintingCaption .caption-title {
    font-size: 0.42rem; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(255,255,255,0.6);
    margin-top: 3px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* ── ACCENT BAR ── */
  #popupAccent { height: 3px; background: #1a1a1a; }
  #popup.win  #popupAccent { background: #2d6a46; }
  #popup.loss #popupAccent { background: #8a2a2a; display: none; }
  #popup.audiobook #popupAccent {
    height: 4px;
    background: linear-gradient(90deg,#c4a454,#e8cc80,#c4a454);
    background-size: 200% 100%;
    animation: goldShimmer 2s linear infinite;
  }
  @keyframes goldShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── STREAK PROGRESS BAR (win popup only) ── */
  #streakProgressBar { height: 2px; background: #f0ede8; overflow: hidden; }
  #streakProgressFill { height: 100%; background: #2d6a46; width: 0%; transition: width 0.9s ease; }

  /* ── POPUP BODY ── */
  #popupBody { padding: 24px 22px 26px; }
  #popupEmoji { font-size: 1.5rem; margin-bottom: 8px; display: block; }
  #popupTitle {
    font-family: 'Cormorant', serif; font-weight: 300;
    font-size: 1.4rem; letter-spacing: 0.12em; color: #111; margin-bottom: 8px;
  }
  /* On loss the painter name is shown in the painting caption — hide text title */
  #popup.loss #popupTitle { display: none; }

  #popupInfo { font-size: 0.5rem; letter-spacing: 0.12em; color: #999; line-height: 2.1; margin-bottom: 20px; text-transform: uppercase; }
  /* On loss, info is just the painting subtitle — style it differently */
  #popup.loss #popupInfo { color: #bbb; font-size: 0.46rem; margin-bottom: 20px; }

  #audiobookHint { font-size: 0.4rem; letter-spacing: 0.22em; text-transform: uppercase; color: #c4a454; margin-bottom: 18px; }

  /* ── AUDIOBOOK FORM ── */
  #audiobookForm { text-align: left; }
  .ab-label { display: block; font-size: 0.4rem; letter-spacing: 0.28em; text-transform: uppercase; color: #bbb; margin-bottom: 6px; }
  .ab-select, .ab-input {
    width: 100%; padding: 11px 14px; margin-bottom: 12px;
    border: 1px solid #e0ddd8; background: #fafaf8;
    font-family: 'Montserrat', sans-serif; font-weight: 300;
    font-size: 0.55rem; letter-spacing: 0.08em; color: #1a1a1a;
    outline: none; transition: border-color 0.18s;
    -webkit-appearance: none; appearance: none;
  }
  .ab-select:focus, .ab-input:focus { border-color: #c4a454; }
  .ab-select {
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23bbb' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 14px center;
    padding-right: 36px; cursor: pointer;
  }
  .ab-submit {
    width: 100%; padding: 13px; border: none;
    background: linear-gradient(135deg,#c4a454,#ddb96a);
    font-family: 'Montserrat', sans-serif; font-weight: 300;
    font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: #fff; cursor: pointer; transition: opacity 0.2s;
  }
  .ab-submit:hover { opacity: 0.88; }
  #abSuccess { display:none; padding: 10px 0 4px; }

  /* ── POPUP BUTTON ── */
  #popupBtn {
    padding: 11px 34px; border: 1px solid #1a1a1a; background: #fff;
    font-family: 'Montserrat', sans-serif; font-weight: 300;
    font-size: 0.55rem; letter-spacing: 0.32em; text-transform: uppercase;
    cursor: pointer; color: #1a1a1a; transition: background 0.2s, color 0.2s;
  }
  #popupBtn:hover { background: #1a1a1a; color: #fff; }
  .ab-continue { padding: 11px 34px; border: 1px solid #1a1a1a; background: #fff; font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.55rem; letter-spacing: 0.32em; text-transform: uppercase; cursor: pointer; color: #1a1a1a; transition: background 0.2s, color 0.2s; }
  .ab-continue:hover { background: #1a1a1a; color: #fff; }
  #popupEnterHint { margin-top: 10px; font-size: 0.38rem; letter-spacing: 0.22em; text-transform: uppercase; color: #d8d4ce; }
  @media (max-width: 640px) { html, body { overflow: auto; } #pageShell { height: auto; } #gameArea { flex-direction: column; } #paintingCol { flex: none; height: 56vw; min-height: 200px; border-right: none; border-bottom: 1px solid #e8e8e8; } #paintingCanvas { max-height: 56vw; } #choicesCol { flex: none; width: 100%; padding: 14px; } #siteTitle { font-size: 1.1rem; } }
</style>
</head>
<body>
<div id="pageShell">
  <header>
    <h1 id="siteTitle">
      <span>The Daily</span>
      <span id="titleSwitcher" tabindex="0">
        <span id="wordArt">Art</span>
        <span id="wordThought">Thought</span>
       <div id="titleDropdown" role="menu">
  <button class="title-option active-option" onclick="stayOnArt()">Art<span class="opt-label">You are here · Paintings</span></button>
  <a class="title-option" href="app.html">Thought<span class="opt-label">Philosophy · Daily Quotes</span></a>
</div>
      </span>
      <span>Cult</span>
    </h1>
    <p id="siteTagline">
      <span id="taglineDefault">Where art becomes ritual.</span>
      <span id="taglinePraise"></span>
    </p>
  </header>
  <div id="gameArea">
    <div id="paintingCol">
      <div id="paintingWrap">
        <canvas id="paintingCanvas"></canvas>
        <div id="paintingShield" oncontextmenu="return false" ondragstart="return false"></div>
      </div>
    </div>
    <div id="choicesCol">
      <div id="streakDots"></div>
      <p id="choicesPrompt">Who painted this?</p>
      <div id="choices"></div>
      <div id="keyHint"><span>1</span><span>2</span><span>3</span><span>4</span> to select &nbsp;·&nbsp; <span>Enter</span> to confirm</div>
      <div id="collectionSwitcher">
        <p>Your Collection</p>
        <div id="collectionBtns"></div>
      </div>
    </div>
  </div>
</div>
<div id="overlay">
  <div id="popup">

    <!-- PAINTING REVEAL — only visible on wrong answer (.loss class) -->
    <div id="popupPaintingReveal">
      <img id="popupPaintingImg" src="" alt="">
      <div id="popupPaintingCaption">
        <div class="caption-painter" id="captionPainter"></div>
        <div class="caption-title"  id="captionTitle"></div>
      </div>
    </div>

    <div id="popupAccent"></div>
    <div id="streakProgressBar"><div id="streakProgressFill"></div></div>

    <div id="popupBody">
      <span id="popupEmoji"></span>
      <div id="popupTitle"></div>
      <div id="popupInfo"></div>
      <div id="audiobookHint"></div>

      <!-- Audiobook form — only shown on 50-streak -->
      <div id="audiobookForm" style="display:none">
        <label class="ab-label" for="abPainter">Choose your audiobook</label>
        <select class="ab-select" id="abPainter">
          <option value="">Select a painter…</option>
          <option>Claude Monet — Impressionism &amp; Light</option>
          <option>Vincent van Gogh — The Tormented Genius</option>
          <option>Leonardo da Vinci — Mind of a Renaissance Man</option>
          <option>Rembrandt — Masters of Light &amp; Shadow</option>
          <option>Pablo Picasso — Breaking Every Rule</option>
          <option>Johannes Vermeer — Mystery of the Dutch Master</option>
          <option>Caravaggio — Drama, Darkness &amp; Devotion</option>
          <option>Gustav Klimt — Gold, Symbolism &amp; Vienna</option>
          <option>Salvador Dalí — The Surrealist Mind</option>
          <option>Edvard Munch — Anxiety &amp; Expression</option>
        </select>
        <label class="ab-label" for="abEmail">Your email address</label>

        <button class="ab-submit" onclick="submitAudiobook()">Claim My Free Audiobook →</button>

// ========== PAINTER REPETITION PREVENTION ==========
// Track recently used painters - NEVER repeat until you've seen at least 15 different ones
let recentPainters = [];  // IDs of painters used in last N rounds
const MAX_RECENT_PAINTERS = 15;  // Must see 15 different painters before repeating any

// Track painting history per painter (prevents same painting repeating)
let paintingsCache = new Map();
let perPainterArtHistory = new Map();
const MAX_ART_HISTORY = 8;

// Store current painting info for the loss popup
let currentPaintingUrl = '';
let currentPaintingTitle = '';

async function fetchPaintingsForPainter(painter) {
  if (paintingsCache.has(painter.id)) return paintingsCache.get(painter.id);
  const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=categorymembers&gcmtitle=Category:${encodeURIComponent(painter.category)}&gcmtype=file&gcmlimit=45&prop=imageinfo&iiprop=url|dimensions&iiurlwidth=800&format=json&origin=*`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.query?.pages) return [];
    const paintings = [];
    for (const page of Object.values(data.query.pages)) {
      if (page.imageinfo?.[0]?.thumburl) {
        const info = page.imageinfo[0];
        if (info.width > 220 && info.height > 160) {
          paintings.push({
            title: page.title.replace(/^File:/,'').replace(/\.(jpg|jpeg|png)$/i,'').replace(/_/g,' ').substring(0,80),
            url: info.thumburl
          });
        }
      }
    }
    for (let i = paintings.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [paintings[i], paintings[j]] = [paintings[j], paintings[i]];
    }
    paintingsCache.set(painter.id, paintings);
    return paintings;
  } catch(e) { return []; }
}

function getFreshPainting(painter, paintings) {
  if (!paintings.length) return null;
  const history = perPainterArtHistory.get(painter.id) || [];
  const unseen = paintings.filter(p => !history.includes(p.url));
  let chosen;
  if (unseen.length === 0) {
    perPainterArtHistory.set(painter.id, []);
    chosen = paintings[Math.floor(Math.random() * paintings.length)];
  } else {
    chosen = unseen[Math.floor(Math.random() * unseen.length)];
  }
  let newHist = [...history, chosen.url];
  if (newHist.length > MAX_ART_HISTORY) newHist = newHist.slice(-MAX_ART_HISTORY);
  perPainterArtHistory.set(painter.id, newHist);
  return chosen;
}

// Get a painter that hasn't been used recently
function getFreshPainter(availablePainters) {
  const eligible = availablePainters.filter(p => !recentPainters.includes(p.id));
  if (eligible.length === 0) {
    // Reset recent painters if all have been seen
    recentPainters = [];
    return availablePainters[Math.floor(Math.random() * availablePainters.length)];
  }
  return eligible[Math.floor(Math.random() * eligible.length)];
}

// Get wrong choices that are also fresh (not recently used, not the correct one)
function getFreshWrongChoices(correctPainter, allPainters, count = 3) {
  const recentSet = new Set(recentPainters);
  recentSet.add(correctPainter.id);
  let candidates = allPainters.filter(p => !recentSet.has(p.id) && p.id !== correctPainter.id);
  
  if (candidates.length < count) {
    // Fallback: just exclude correct painter
    candidates = allPainters.filter(p => p.id !== correctPainter.id);
  }
  
  // Shuffle and take first 'count'
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  return candidates.slice(0, count);
}

async function loadPainting(painter) {
  const canvas = document.getElementById('paintingCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 700; canvas.height = 400;
  ctx.fillStyle = '#f5f4f0'; ctx.fillRect(0,0,700,400);
  ctx.fillStyle = '#ccc'; ctx.font = '300 11px Montserrat, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Loading masterpiece...', 350, 200);
  
  const paintings = await fetchPaintingsForPainter(painter);
  if (!paintings.length) return false;
  const painting = getFreshPainting(painter, paintings);
  if (!painting) return false;
  
  // Store current painting info for loss popup
  currentPaintingUrl = painting.url;
  currentPaintingTitle = painting.title;
  
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const col = document.getElementById('paintingCol');
      const availW = col ? col.clientWidth - 20 : window.innerWidth - 340;
      const availH = col ? col.clientHeight - 30 : window.innerHeight - 90;
      let scale = Math.min(availW / img.width, availH / img.height, 1);
      canvas.width = Math.max(180, Math.round(img.width * scale));
      canvas.height = Math.max(140, Math.round(img.height * scale));
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(true);
    };
    img.onerror = () => {
      console.error('Failed to load painting image:', painting.url);
      resolve(false);
    };
    img.src = painting.url;
  });
}

async function nextRound() {
  if (answered || isLoading) return;
  if (!activePainters.length) return;
  isLoading = true;
  
  // Get a fresh painter (not in recent history)
  currentPainter = getFreshPainter(activePainters);
  
  const success = await loadPainting(currentPainter);
  if (!success) { isLoading = false; setTimeout(() => nextRound(), 400); return; }
  
  // Add to recent painters list
  recentPainters.push(currentPainter.id);
  if (recentPainters.length > MAX_RECENT_PAINTERS) recentPainters.shift();
  
  // Get fresh wrong choices (also not recently used)
  const wrongs = getFreshWrongChoices(currentPainter, activePainters, 3);
  let options = [...wrongs, currentPainter];
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }
  
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  options.forEach((p, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="btn-num">${idx+1}</span>${p.name}`;
    btn.onclick = () => answer(btn, p);
    choicesDiv.appendChild(btn);
  });
  isLoading = false;
  answered = false;
}

let lastGenericIdx = -1;

function flashPraise(painterId, callback) {
  const specific = PAINTER_PRAISE[painterId];
  let generic;
  do { generic = Math.floor(Math.random() * GENERIC_PRAISE.length); }
  while (generic === lastGenericIdx && GENERIC_PRAISE.length > 1);
  lastGenericIdx = generic;

  // Pick one: painter-specific if exists, otherwise generic
  const line = specific || GENERIC_PRAISE[generic];

  const tagline  = document.getElementById('siteTagline');
  const praiseEl = document.getElementById('taglinePraise');

  praiseEl.textContent = line;
  tagline.classList.add('praise-active');

  // Brief shimmer on the title itself
  const titleEl = document.getElementById('siteTitle');
  titleEl.classList.add('correct-flash');
  setTimeout(() => titleEl.classList.remove('correct-flash'), 1200);

  setTimeout(() => {
    tagline.classList.remove('praise-active');
    // Wait for slide-out transition then fire callback
    setTimeout(callback, 520);
  }, 2000);
}

function answer(btn, painter) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);
  const correct = (painter.id === currentPainter.id);
  if (correct) {
    btn.classList.add('correct');
    streak++;
    updateDots();
    if (streak >= 50) {
      flashPraise(painter.id, () => showAudiobookReward());
    } else if (streak >= 10) {
      flashPraise(painter.id, () => setTimeout(() => showPopup(true), 500));
    } else {
      flashPraise(painter.id, () => setTimeout(() => { answered = false; nextRound(); }, 750));
    }
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === currentPainter.name) b.classList.add('correct'); });
    streak = 0; updateDots();
    recentPainters = []; // Reset painter history on loss
    setTimeout(() => showPopup(false), 500);
  }
}

      };
      img.onerror = () => {
        console.error('Failed to load image for popup:', currentPaintingUrl);
        img.classList.add('error-load');
        // Set a fallback background color and text
        img.alt = currentPaintingTitle || 'Painting image unavailable';
        // Still show the caption even if image fails
        img.classList.add('loaded'); // Show the container with fallback styling
      };
      img.src = currentPaintingUrl;
    } else {
      // No URL available - show placeholder
      img.classList.add('error-load');
      img.classList.add('loaded');
      img.alt = 'Image temporarily unavailable';
    }

    overlay.classList.add('loss-overlay');
    overlay.classList.add('show');
    document.getElementById('popup').className = 'loss';
  }
}

function closePopup() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('show');
  overlay.classList.remove('win-overlay');
  overlay.classList.remove('loss-overlay');
  if (popupWasWin && streak >= 10) { 
    streak = 0; 
    updateDots(); 
    recentPainters = [];
  }
  answered = false;
  nextRound();
}

function pickChip(btn) {
  document.querySelectorAll('.col-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  streak = 0; updateDots();
  recentPainters = [];
  perPainterArtHistory.clear();
  const key = btn.dataset.col;
  if (key === 'full') activePainters = PAINTERS_MASTER;
  else activePainters = PAINTERS_MASTER.filter(p => p.tags.includes(key));
  if (activePainters.length < 2) {
    document.getElementById('choices').innerHTML = '<p style="padding:20px;color:#aaa;text-align:center;">Not enough painters.<br>Try "Full" collection.</p>';
    return;
  }
  nextRound();
}

function buildCollectionButtons() {
  const collections = getUniqueCollections();
  const container = document.getElementById('collectionBtns');
  container.innerHTML = '';
  collections.forEach(col => {
    const btn = document.createElement('button');
    btn.className = 'col-chip';
    if (col === 'popular') btn.classList.add('active');
    btn.textContent = col.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    btn.dataset.col = col;
    btn.onclick = () => pickChip(btn);
    container.appendChild(btn);
  });
}

let keySelected = -1;
document.addEventListener('keydown', e => {
  const overlay = document.getElementById('overlay');
  if (overlay.classList.contains('show')) { if (e.key === 'Enter') { e.preventDefault(); closePopup(); } return; }
  if (answered) return;
  const btns = Array.from(document.querySelectorAll('.choice-btn:not(:disabled)'));
  if (!btns.length) return;
  if (['1','2','3','4'].includes(e.key)) {
    e.preventDefault();
    const idx = parseInt(e.key)-1;
    if (idx < btns.length) {
      btns.forEach(b => b.classList.remove('key-flash'));
      btns[idx].classList.add('key-flash');
      keySelected = idx;
      setTimeout(() => btns[idx]?.classList.remove('key-flash'), 180);
    }
  }
  if (e.key === 'Enter') { e.preventDefault(); if (keySelected >=0 && keySelected < btns.length) { btns[keySelected].click(); keySelected=-1; } }
});

const switcher = document.getElementById('titleSwitcher');
const dropdown = document.getElementById('titleDropdown');
const wordArt = document.getElementById('wordArt');
const wordThought = document.getElementById('wordThought');
function openDrop() { dropdown.classList.add('open'); wordArt.style.opacity='0'; wordArt.style.transform='translateY(-6px)'; wordThought.style.opacity='1'; wordThought.style.transform='translateY(0)'; switcher.style.minWidth = wordThought.scrollWidth + 'px'; }
function closeDrop() { dropdown.classList.remove('open'); wordArt.style.opacity='1'; wordArt.style.transform='translateY(0)'; wordThought.style.opacity='0'; wordThought.style.transform='translateY(6px)'; switcher.style.minWidth = ''; }
switcher.addEventListener('mouseenter', openDrop);
switcher.addEventListener('mouseleave', closeDrop);
function stayOnArt() { closeDrop(); }

function submitAudiobook() {
  const painter = document.getElementById('abPainter').value;
  const email   = document.getElementById('abEmail').value;
  if (!painter || !email || !email.includes('@')) {
    document.getElementById('abEmail').style.borderColor = '#8a2a2a';
    setTimeout(() => { document.getElementById('abEmail').style.borderColor = ''; }, 1200);
    return;
  }
  // Wire to your email service here in production
  document.getElementById('audiobookForm').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('audiobookForm').style.display = 'none';
    document.getElementById('abSuccess').style.display = 'block';
    document.getElementById('popupEmoji').textContent = '✦';
    document.getElementById('popupTitle').textContent = 'On Its Way';
    document.getElementById('popupInfo').innerHTML = 'Your audiobook is on its way.<br>Check your inbox within 24 hours.';
    document.getElementById('popupBtn').style.display = '';
    document.getElementById('popupEnterHint').style.display = '';
  }, 300);
}

function init() {
  buildStreakDots();
  buildCollectionButtons();
  activePainters = PAINTERS_MASTER.filter(p => p.tags.includes('popular'));
  nextRound();
}
init();
</script>
