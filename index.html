<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Art Cult</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #fff;
    color: #1a1a1a;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  #pageShell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    flex-shrink: 0;
    padding: 16px 24px 14px;
    text-align: center;
    border-bottom: 1px solid #e8e8e8;
  }

  header h1 {
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: 1.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #111;
  }

  header p {
    font-size: 0.55rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #aaa;
    margin-top: 3px;
  }

  #gameArea {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  #paintingCol {
    flex: 1 1 60%;
    position: relative;
    background: #f9f9f9;
    border-right: 1px solid #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-width: 0;
  }

  #paintingWrap {
    position: relative;
    line-height: 0;
    max-width: 100%;
    max-height: 100%;
  }

  #paintingCanvas {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 80px);
    width: auto;
    height: auto;
    object-fit: contain;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none;
  }

  #paintingShield {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: transparent;
  }

  #choicesCol {
    flex: 0 0 300px;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 0;
    overflow: hidden;
  }

  #streakDots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding-bottom: 20px;
    border-bottom: 1px solid #f0f0f0;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    border: 1px solid #bbb;
    background: #fff;
    transition: all 0.25s;
  }

  .dot.filled {
    background: #1a1a1a;
    border-color: #1a1a1a;
  }

  #choicesPrompt {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #bbb;
    text-align: center;
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  #choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    justify-content: center;
  }

  .choice-btn {
    width: 100%;
    padding: 14px 12px;
    border: 1px solid #d0d0d0;
    background: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    color: #1a1a1a;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: #1a1a1a;
    background: #fafafa;
  }

  .choice-btn.correct {
    border-color: #2d7a4a;
    background: #f0faf4;
    color: #1a4a2e;
  }

  .choice-btn.wrong {
    border-color: #9a2a2a;
    background: #fdf4f4;
    color: #6a1a1a;
  }

  .choice-btn:disabled { cursor: default; }

  #collectionSwitcher {
    flex-shrink: 0;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid #f0f0f0;
  }

  #collectionSwitcher p {
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #ccc;
    text-align: center;
    margin-bottom: 8px;
  }

  #collectionBtns {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
  }

  .col-chip {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.48rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 9px;
    border: 1px solid #e0e0e0;
    background: #fff;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
  }

  .col-chip:hover { border-color: #aaa; color: #444; }
  .col-chip.active { border-color: #1a1a1a; color: #1a1a1a; background: #1a1a1a; color: #fff; }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #overlay.show { display: flex; }

  #popup {
    background: #fff;
    max-width: 400px;
    width: 100%;
    text-align: center;
    overflow: hidden;
  }

  #popupBody {
    padding: 28px 24px 30px;
  }

  #popupEmoji { font-size: 2rem; margin-bottom: 10px; }

  #popupTitle {
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: #111;
    margin-bottom: 10px;
  }

  #popupInfo {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: #888;
    line-height: 2;
    margin-bottom: 22px;
    text-transform: uppercase;
  }

  #popupBtn {
    padding: 12px 36px;
    border: 1px solid #1a1a1a;
    background: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    color: #1a1a1a;
    transition: all 0.2s;
  }

  #popupBtn:hover { background: #1a1a1a; color: #fff; }

  @media (max-width: 640px) {
    html, body { overflow: auto; }
    #pageShell { height: auto; }
    #gameArea { flex-direction: column; }
    #paintingCol {
      flex: none;
      height: 55vw;
      min-height: 200px;
      border-right: none;
      border-bottom: 1px solid #e8e8e8;
    }
    #paintingCanvas { max-height: 55vw; }
    #choicesCol {
      flex: none;
      width: 100%;
      padding: 16px;
    }
  }
</style>
</head>
<body>

<div id="pageShell">

  <header>
    <h1>The Daily Art Cult</h1>
    <p>Where art becomes ritual.</p>
  </header>

  <div id="gameArea">

    <div id="paintingCol">
      <div id="paintingWrap">
        <canvas id="paintingCanvas"></canvas>
        <div id="paintingShield"
          oncontextmenu="return false"
          ondragstart="return false"
          onselectstart="return false">
        </div>
      </div>
    </div>

    <div id="choicesCol">

      <div id="streakDots"></div>

      <p id="choicesPrompt">Who painted this?</p>

      <div id="choices"></div>

      <div id="collectionSwitcher">
        <p>Your Collection</p>
        <div id="collectionBtns">
          <button class="col-chip active" data-col="popular">Popular</button>
          <button class="col-chip" data-col="french">French</button>
          <button class="col-chip" data-col="impressionist">Impressionist</button>
          <button class="col-chip" data-col="russian">Russian</button>
          <button class="col-chip" data-col="renaissance">Renaissance</button>
          <button class="col-chip" data-col="realist">Realist</button>
          <button class="col-chip" data-col="full">Full</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="overlay">
  <div id="popup">
    <div id="popupBody">
      <div id="popupEmoji"></div>
      <div id="popupTitle"></div>
      <div id="popupInfo"></div>
      <button id="popupBtn" onclick="closePopup()">Continue</button>
    </div>
  </div>
</div>

<script>
// ANTI-CHEAT
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || (e.ctrlKey && e.key.toUpperCase() === 'U')) {
    e.preventDefault();
  }
});
document.addEventListener('dragstart', e => {
  if (e.target.tagName === 'IMG' || e.target.tagName === 'CANVAS') e.preventDefault();
});

// PAINTERS MASTER LIST
const PAINTERS_MASTER = [
  { id: "claude-monet", name: "Claude Monet", category: "Paintings_by_Claude_Monet", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1840, died: 1926 },
  { id: "vincent-van-gogh", name: "Vincent van Gogh", category: "Paintings_by_Vincent_van_Gogh", tags: ["popular", "impressionist"], nationality: "Dutch", born: 1853, died: 1890 },
  { id: "pablo-picasso", name: "Pablo Picasso", category: "Paintings_by_Pablo_Picasso", tags: ["popular"], nationality: "Spanish", born: 1881, died: 1973 },
  { id: "rembrandt", name: "Rembrandt van Rijn", category: "Paintings_by_Rembrandt_van_Rijn", tags: ["popular"], nationality: "Dutch", born: 1606, died: 1669 },
  { id: "johannes-vermeer", name: "Johannes Vermeer", category: "Paintings_by_Johannes_Vermeer", tags: ["popular"], nationality: "Dutch", born: 1632, died: 1675 },
  { id: "edouard-manet", name: "Édouard Manet", category: "Paintings_by_Édouard_Manet", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1832, died: 1883 },
  { id: "paul-cezanne", name: "Paul Cézanne", category: "Paintings_by_Paul_Cézanne", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1839, died: 1906 },
  { id: "pierre-renoir", name: "Pierre-Auguste Renoir", category: "Paintings_by_Pierre-Auguste_Renoir", tags: ["popular", "french", "impressionist"], nationality: "French", born: 1841, died: 1919 },
  { id: "francisco-goya", name: "Francisco de Goya", category: "Paintings_by_Francisco_de_Goya", tags: ["popular", "realist"], nationality: "Spanish", born: 1746, died: 1828 },
  { id: "eugene-delacroix", name: "Eugène Delacroix", category: "Paintings_by_Eugène_Delacroix", tags: ["popular", "french"], nationality: "French", born: 1798, died: 1863 },
  { id: "sandro-botticelli", name: "Sandro Botticelli", category: "Paintings_by_Sandro_Botticelli", tags: ["popular", "renaissance"], nationality: "Italian", born: 1445, died: 1510 },
  { id: "leonardo-da-vinci", name: "Leonardo da Vinci", category: "Paintings_by_Leonardo_da_Vinci", tags: ["popular", "renaissance"], nationality: "Italian", born: 1452, died: 1519 },
  { id: "michelangelo", name: "Michelangelo", category: "Paintings_by_Michelangelo", tags: ["popular", "renaissance"], nationality: "Italian", born: 1475, died: 1564 },
  { id: "raphael", name: "Raphael", category: "Paintings_by_Raphael", tags: ["popular", "renaissance"], nationality: "Italian", born: 1483, died: 1520 },
  { id: "caravaggio", name: "Caravaggio", category: "Paintings_by_Caravaggio", tags: ["popular"], nationality: "Italian", born: 1571, died: 1610 },
  { id: "diego-velazquez", name: "Diego Velázquez", category: "Paintings_by_Diego_Velázquez", tags: ["popular"], nationality: "Spanish", born: 1599, died: 1660 },
  { id: "camille-pissarro", name: "Camille Pissarro", category: "Paintings_by_Camille_Pissarro", tags: ["french", "impressionist"], nationality: "French", born: 1830, died: 1903 },
  { id: "gustave-courbet", name: "Gustave Courbet", category: "Paintings_by_Gustave_Courbet", tags: ["french", "realist"], nationality: "French", born: 1819, died: 1877 },
  { id: "ilya-repin", name: "Ilya Repin", category: "Paintings_by_Ilya_Repin", tags: ["russian", "realist"], nationality: "Russian", born: 1844, died: 1930 },
  { id: "ivan-shishkin", name: "Ivan Shishkin", category: "Paintings_by_Ivan_Shishkin", tags: ["russian", "realist"], nationality: "Russian", born: 1832, died: 1898 },
  { id: "jan-van-eyck", name: "Jan van Eyck", category: "Paintings_by_Jan_van_Eyck", tags: ["renaissance"], nationality: "Flemish", born: 1390, died: 1441 },
  { id: "titian", name: "Titian", category: "Paintings_by_Titian", tags: ["renaissance"], nationality: "Italian", born: 1488, died: 1576 },
  { id: "winslow-homer", name: "Winslow Homer", category: "Paintings_by_Winslow_Homer", tags: ["realist"], nationality: "American", born: 1836, died: 1910 },
  { id: "gustav-klimt", name: "Gustav Klimt", category: "Paintings_by_Gustav_Klimt", tags: ["popular"], nationality: "Austrian", born: 1862, died: 1918 },
  { id: "edvard-munch", name: "Edvard Munch", category: "Paintings_by_Edvard_Munch", tags: ["popular"], nationality: "Norwegian", born: 1863, died: 1944 }
];

// GAME STATE
let allPainters = PAINTERS_MASTER;
let activePainters = [];
let currentPainter = null;
let streak = 0;
let answered = false;
let popupWasWin = false;
let isLoading = false;

// Cache for painter paintings to avoid repeated API calls
let paintingsCache = new Map();

function buildStreakDots() {
  const el = document.getElementById('streakDots');
  el.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    el.appendChild(d);
  }
}

function updateDots() {
  for (let i = 0; i < 10; i++) {
    const dot = document.getElementById('dot-' + i);
    if (dot) dot.className = 'dot' + (i < streak ? ' filled' : '');
  }
}

function pickChip(btn) {
  document.querySelectorAll('.col-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  streak = 0;
  updateDots();
  applyCollection(btn.dataset.col);
}

function applyCollection(key) {
  if (key === 'full') {
    activePainters = allPainters;
  } else {
    activePainters = allPainters.filter(p => p.tags && p.tags.includes(key));
  }
  
  if (activePainters.length < 2) {
    document.getElementById('choices').innerHTML = '<p style="padding:20px;color:#aaa;font-size:.65rem;letter-spacing:.2em;text-align:center;">Not enough painters in this collection.</p>';
    return;
  }
  
  nextRound();
}

// Fetch paintings from Wikimedia API for a specific painter
async function fetchPaintingsForPainter(painter) {
  if (paintingsCache.has(painter.id)) {
    return paintingsCache.get(painter.id);
  }
  
  const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=categorymembers&gcmtitle=Category:${encodeURIComponent(painter.category)}&gcmtype=file&gcmlimit=30&prop=imageinfo&iiprop=url|dimensions&iiurlwidth=800&format=json&origin=*`;
  
  try {
    const response = await fetch(url);
    const data = await response.json();
    
    if (!data.query || !data.query.pages) return [];
    
    const paintings = [];
    for (const page of Object.values(data.query.pages)) {
      if (page.imageinfo && page.imageinfo[0] && page.imageinfo[0].thumburl) {
        const info = page.imageinfo[0];
        if (info.width && info.height && info.width > 200 && info.height > 150) {
          paintings.push({
            title: page.title.replace(/^File:/, '').replace(/\.(jpg|jpeg|png)$/i, '').replace(/_/g, ' ').substring(0, 80),
            url: info.thumburl
          });
        }
      }
    }
    
    paintingsCache.set(painter.id, paintings);
    return paintings;
  } catch (error) {
    console.error(`Failed to fetch for ${painter.name}:`, error);
    return [];
  }
}

async function loadPainting(painter) {
  const canvas = document.getElementById('paintingCanvas');
  const ctx = canvas.getContext('2d');
  
  // Show loading
  canvas.width = 700;
  canvas.height = 380;
  canvas.style.width = '100%';
  ctx.fillStyle = '#f8f8f8';
  ctx.fillRect(0, 0, 700, 380);
  ctx.fillStyle = '#ccc';
  ctx.font = '300 11px Montserrat, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Loading masterpiece...', 350, 195);
  
  const paintings = await fetchPaintingsForPainter(painter);
  
  if (!paintings || paintings.length === 0) {
    console.warn(`No paintings found for ${painter.name}`);
    return false;
  }
  
  const randomPainting = paintings[Math.floor(Math.random() * paintings.length)];
  window._currentPaintingTitle = randomPainting.title;
  
  return new Promise((resolve) => {
    const img = new Image();
    
    img.onload = function() {
      const col = document.getElementById('paintingCol');
      const availW = col ? col.clientWidth - 2 : window.innerWidth - 302;
      const availH = col ? col.clientHeight - 2 : window.innerHeight - 80;
      
      const scaleW = availW / img.width;
      const scaleH = availH / img.height;
      const scale = Math.min(scaleW, scaleH, 1);
      
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(true);
    };
    
    img.onerror = function() {
      console.warn(`Failed to load image for ${painter.name}, trying another`);
      // Remove failed painting from cache and try again
      const currentCache = paintingsCache.get(painter.id) || [];
      const newCache = currentCache.filter(p => p.url !== randomPainting.url);
      paintingsCache.set(painter.id, newCache);
      
      if (newCache.length > 0) {
        loadPainting(painter).then(resolve);
      } else {
        resolve(false);
      }
    };
    
    img.src = randomPainting.url;
  });
}

async function nextRound() {
  if (answered || isLoading) return;
  answered = false;
  
  if (activePainters.length < 2) {
    return;
  }
  
  isLoading = true;
  
  // Pick random painter
  const randomIndex = Math.floor(Math.random() * activePainters.length);
  currentPainter = activePainters[randomIndex];
  
  // Get wrong options
  const otherPainters = activePainters.filter(p => p.id !== currentPainter.id);
  const wrongOnes = [];
  const shuffled = [...otherPainters];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  for (let i = 0; i < Math.min(3, shuffled.length); i++) {
    wrongOnes.push(shuffled[i]);
  }
  
  const options = [...wrongOnes, currentPainter];
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }
  
  // Load the painting
  const success = await loadPainting(currentPainter);
  
  if (!success) {
    // If failed, try a different painter
    isLoading = false;
    nextRound();
    return;
  }
  
  // Display choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = p.name;
    btn.onclick = () => answer(btn, p);
    choicesEl.appendChild(btn);
  });
  
  isLoading = false;
}

function answer(btn, painter) {
  if (answered) return;
  answered = true;
  
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);
  
  const correct = painter.id === currentPainter.id;
  
  if (correct) {
    btn.classList.add('correct');
    streak++;
    updateDots();
    if (streak >= 10) {
      setTimeout(() => showPopup(true), 500);
    } else {
      setTimeout(() => {
        answered = false;
        nextRound();
      }, 800);
    }
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.textContent === currentPainter.name) b.classList.add('correct');
    });
    streak = 0;
    updateDots();
    setTimeout(() => showPopup(false), 500);
  }
}

function showPopup(won) {
  popupWasWin = won;
  const emoji = document.getElementById('popupEmoji');
  const title = document.getElementById('popupTitle');
  const info = document.getElementById('popupInfo');
  const popupBtn = document.getElementById('popupBtn');
  
  if (won) {
    emoji.textContent = '✦';
    title.textContent = '10 in a Row';
    info.innerHTML = 'You correctly identified ten paintings in a row.<br>Exceptional.';
    popupBtn.textContent = 'Continue';
  } else {
    emoji.textContent = '';
    title.textContent = currentPainter.name;
    const line1 = [currentPainter.nationality ? currentPainter.nationality + ' Painter' : '', (currentPainter.born && currentPainter.died) ? currentPainter.born + ' – ' + currentPainter.died : ''].filter(Boolean).join('  ·  ');
    const paintingLine = window._currentPaintingTitle ? '<br>Painting: ' + window._currentPaintingTitle : '';
    info.innerHTML = line1 + (paintingLine ? paintingLine : '');
    popupBtn.textContent = 'Try Again';
  }
  
  document.getElementById('overlay').classList.add('show');
}

function closePopup() {
  document.getElementById('overlay').classList.remove('show');
  if (popupWasWin) {
    streak = 0;
    updateDots();
  }
  answered = false;
  nextRound();
}

function init() {
  buildStreakDots();
  
  // Setup collection chips
  document.querySelectorAll('.col-chip').forEach(chip => {
    chip.addEventListener('click', () => pickChip(chip));
  });
  
  applyCollection('popular');
}

// Start the game
init();
</script>
</body>
</html>
