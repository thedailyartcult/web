<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Art Cult</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  /* ── RESET ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #fafaf8;
    color: #1a1a1a;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── SHELL ── */
  #pageShell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ══════════════════════════════════════
     HEADER & ANIMATED TITLE
  ══════════════════════════════════════ */
  header {
    flex-shrink: 0;
    padding: 14px 24px 12px;
    text-align: center;
    border-bottom: 1px solid #e8e8e8;
    background: #fff;
    position: relative;
    z-index: 10;
  }

  /* The full title sits in a flex row so we can animate the middle word */
  #siteTitle {
    display: inline-flex;
    align-items: baseline;
    gap: 0.38em;
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: 1.55rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #111;
    cursor: default;
    user-select: none;
  }

  /* The switchable word wrapper */
  #titleSwitcher {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }

  /* Both words stack in the same space */
  #wordArt,
  #wordThought {
    display: block;
    transition: opacity 0.28s ease, transform 0.28s ease;
    letter-spacing: 0.32em;
  }

  #wordThought {
    position: absolute;
    top: 0; left: 0;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(6px);
    color: #7a5c3a; /* warm sepia for "thought" */
    pointer-events: none;
  }

  /* Underline hint on the switchable word */
  #titleSwitcher::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 1px;
    background: #bbb;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
  }

  #titleSwitcher:hover::after { transform: scaleX(1); }

  /* Tooltip dropdown */
  #titleDropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    background: #fff;
    border: 1px solid #e0e0e0;
    min-width: 220px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  /* Bridge gap between switcher and dropdown so mouse doesn't lose hover */
  #titleSwitcher::before {
    content: '';
    position: absolute;
    bottom: -8px;
    left: -20px;
    right: -20px;
    height: 12px;
  }

  #titleDropdown.open {
    opacity: 1;
    pointer-events: all;
    transform: translateX(-50%) translateY(0);
  }

  .title-option {
    display: block;
    width: 100%;
    padding: 14px 20px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }

  .title-option:hover { background: #f7f7f7; color: #111; }
  .title-option.active-option { color: #aaa; cursor: default; }
  .title-option.active-option:hover { background: none; color: #aaa; }

  .title-option .opt-label {
    display: block;
    font-size: 0.4rem;
    letter-spacing: 0.18em;
    color: #ccc;
    margin-top: 3px;
    text-transform: uppercase;
  }

  .title-option + .title-option { border-top: 1px solid #f0f0f0; }

  header p {
    font-size: 0.5rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: #c0b8b0;
    margin-top: 4px;
  }

  /* ══════════════════════════════════════
     GAME LAYOUT
  ══════════════════════════════════════ */
  #gameArea {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* LEFT col — painting */
  #paintingCol {
    flex: 1 1 60%;
    position: relative;
    background: #f5f4f0;
    border-right: 1px solid #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-width: 0;
  }

  /* Subtle grain texture overlay */
  #paintingCol::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
  }

  #paintingWrap {
    position: relative;
    line-height: 0;
    max-width: 100%;
    max-height: 100%;
    z-index: 2;
    /* Soft shadow so painting floats off the background */
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.13));
    transition: filter 0.4s ease;
  }

  #paintingWrap:hover {
    filter: drop-shadow(0 8px 40px rgba(0,0,0,0.18));
  }

  #paintingCanvas {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 72px);
    width: auto;
    height: auto;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none;
    /* Fade in when a new painting loads */
    animation: fadeCanvas 0.5s ease;
  }

  @keyframes fadeCanvas {
    from { opacity: 0; transform: scale(0.985); }
    to   { opacity: 1; transform: scale(1); }
  }

  #paintingShield {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: transparent;
  }

  /* RIGHT col — choices */
  #choicesCol {
    flex: 0 0 300px;
    display: flex;
    flex-direction: column;
    padding: 22px 18px 18px;
    overflow-y: auto;
    background: #fff;
  }

  /* ── STREAK DOTS ── */
  #streakDots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 7px;
    padding-bottom: 18px;
    border-bottom: 1px solid #f0ede8;
    margin-bottom: 18px;
    flex-shrink: 0;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid #ccc;
    background: #fff;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .dot.filled {
    background: #1a1a1a;
    border-color: #1a1a1a;
    transform: scale(1.15);
  }

  /* ── PROMPT ── */
  #choicesPrompt {
    font-size: 0.48rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #c8c0b8;
    text-align: center;
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  /* ── CHOICE BUTTONS ── */
  #choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    justify-content: center;
  }

  .choice-btn {
    position: relative;
    width: 100%;
    padding: 13px 12px 13px 36px; /* left pad for the number badge */
    border: 1px solid #e0ddd8;
    background: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: left;
    color: #1a1a1a;
    transition: border-color 0.18s, background 0.18s, color 0.18s, transform 0.14s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Number badge — 1 2 3 4 */
  .choice-btn .btn-num {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.42rem;
    letter-spacing: 0.1em;
    color: #ccc;
    font-weight: 300;
    transition: color 0.18s;
    min-width: 10px;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: #1a1a1a;
    background: #faf9f7;
    transform: translateX(2px);
  }

  .choice-btn:hover:not(:disabled) .btn-num { color: #888; }

  /* Keyboard highlight — briefly flash when key pressed */
  .choice-btn.key-flash {
    background: #f0ede8;
    border-color: #aaa;
  }

  .choice-btn.correct {
    border-color: #2d6a46;
    background: #f2faf5;
    color: #1a4030;
    transform: translateX(0);
  }

  .choice-btn.correct .btn-num { color: #2d6a46; }

  .choice-btn.wrong {
    border-color: #8a2a2a;
    background: #fdf3f3;
    color: #5a1a1a;
  }

  .choice-btn:disabled { cursor: default; transform: translateX(0); }

  /* ── KEYBOARD HINT ── */
  #keyHint {
    flex-shrink: 0;
    text-align: center;
    margin-top: 14px;
    font-size: 0.4rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #d8d4ce;
  }

  #keyHint span {
    display: inline-block;
    border: 1px solid #e8e4e0;
    padding: 2px 5px;
    margin: 0 1px;
    font-size: 0.38rem;
  }

  /* ── COLLECTION SWITCHER ── */
  #collectionSwitcher {
    flex-shrink: 0;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #f0ede8;
  }

  #collectionSwitcher p {
    font-size: 0.42rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #ccc;
    text-align: center;
    margin-bottom: 8px;
  }

  #collectionBtns {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
    max-height: 120px;
    overflow-y: auto;
    padding: 2px;
  }

  .col-chip {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.4rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 8px;
    border: 1px solid #e8e4e0;
    background: #fff;
    color: #aaa;
    cursor: pointer;
    transition: all 0.18s;
  }

  .col-chip:hover { border-color: #aaa; color: #555; }
  .col-chip.active { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }

  /* ══════════════════════════════════════
     OVERLAY & POPUP
  ══════════════════════════════════════ */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,6,4,0.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(2px);
    animation: overlayIn 0.2s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  #overlay.show { display: flex; }

  #popup {
    background: #fff;
    max-width: 380px;
    width: 100%;
    text-align: center;
    overflow: hidden;
    animation: popupIn 0.28s cubic-bezier(0.34,1.36,0.64,1);
  }

  @keyframes popupIn {
    from { opacity: 0; transform: scale(0.92) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Thin accent bar at top of popup — changes colour by result */
  #popupAccent {
    height: 3px;
    background: #1a1a1a;
    transition: background 0.3s;
  }

  #popup.win  #popupAccent { background: #2d6a46; }
  #popup.loss #popupAccent { background: #8a2a2a; }

  #popupBody { padding: 26px 24px 28px; }

  #popupEmoji {
    font-size: 1.6rem;
    margin-bottom: 8px;
    display: block;
  }

  #popupTitle {
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: 1.5rem;
    letter-spacing: 0.15em;
    color: #111;
    margin-bottom: 10px;
  }

  #popupInfo {
    font-size: 0.52rem;
    letter-spacing: 0.12em;
    color: #999;
    line-height: 2.1;
    margin-bottom: 22px;
    text-transform: uppercase;
  }

  #popupBtn {
    padding: 11px 34px;
    border: 1px solid #1a1a1a;
    background: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 0.55rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    cursor: pointer;
    color: #1a1a1a;
    transition: background 0.2s, color 0.2s;
  }

  #popupBtn:hover { background: #1a1a1a; color: #fff; }

  /* Enter key hint below popup button */
  #popupEnterHint {
    margin-top: 10px;
    font-size: 0.38rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #d0ccc8;
  }

  /* ══════════════════════════════════════
     MOBILE
  ══════════════════════════════════════ */
  @media (max-width: 640px) {
    html, body { overflow: auto; }
    #pageShell { height: auto; }
    #gameArea { flex-direction: column; }
    #paintingCol {
      flex: none;
      height: 56vw;
      min-height: 200px;
      border-right: none;
      border-bottom: 1px solid #e8e8e8;
    }
    #paintingCanvas { max-height: 56vw; }
    #choicesCol { flex: none; width: 100%; padding: 14px; }
    #titleDropdown { left: 50%; }
    #siteTitle { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div id="pageShell">

  <header>
    <h1 id="siteTitle">
      <span>The Daily</span>
      <span id="titleSwitcher" tabindex="0" aria-label="Switch site">
        <span id="wordArt">Art</span>
        <span id="wordThought">Thought</span>
        <div id="titleDropdown" role="menu">
          <button class="title-option active-option" onclick="stayOnArt()">
            Art
            <span class="opt-label">You are here · Paintings</span>
          </button>
          <a class="title-option" href="app.html" role="menuitem">
            Thought
            <span class="opt-label">The Daily Thought Cult · Philosophy</span>
          </a>
        </div>
      </span>
      <span>Cult</span>
    </h1>
    <p>Where art becomes ritual.</p>
  </header>

  <div id="gameArea">

    <div id="paintingCol">
      <div id="paintingWrap">
        <canvas id="paintingCanvas"></canvas>
        <div id="paintingShield"
          oncontextmenu="return false"
          ondragstart="return false"
          onselectstart="return false">
        </div>
      </div>
    </div>

    <div id="choicesCol">

      <div id="streakDots"></div>

      <p id="choicesPrompt">Who painted this?</p>

      <div id="choices"></div>

      <div id="keyHint">
        <span>1</span><span>2</span><span>3</span><span>4</span> to select &nbsp;·&nbsp; <span>Enter</span> to confirm
      </div>

      <div id="collectionSwitcher">
        <p>Your Collection</p>
        <div id="collectionBtns"></div>
      </div>

    </div>
  </div>
</div>

<div id="overlay">
  <div id="popup">
    <div id="popupAccent"></div>
    <div id="popupBody">
      <span id="popupEmoji"></span>
      <div id="popupTitle"></div>
      <div id="popupInfo"></div>
      <button id="popupBtn" onclick="closePopup()">Continue</button>
      <div id="popupEnterHint">Press <span>Enter</span> to continue</div>
    </div>
  </div>
</div>

<script>
// ANTI-CHEAT
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || (e.ctrlKey && e.key.toUpperCase() === 'U')) {
    e.preventDefault();
  }
});
document.addEventListener('dragstart', e => {
  if (e.target.tagName === 'IMG' || e.target.tagName === 'CANVAS') e.preventDefault();
});

// ============================================

// Each painter has a Wikimedia Commons category
// Add more by following the same pattern
// ============================================

// ============================================
// COLLECTIONS DEFINITIONS
// Dynamically generated from painter tags
// ============================================

function getUniqueCollections() {
  const collectionsSet = new Set();
  collectionsSet.add('full'); // Always include 'full'
  
  PAINTERS_MASTER.forEach(painter => {
    painter.tags.forEach(tag => {
      collectionsSet.add(tag);
    });
  });
  
  // Sort collections alphabetically, but keep 'full' and 'popular' at top
  const collections = Array.from(collectionsSet);
  collections.sort((a, b) => {
    if (a === 'full') return -1;
    if (b === 'full') return 1;
    if (a === 'popular') return -1;
    if (b === 'popular') return 1;
    return a.localeCompare(b);
  });
  
  return collections;
}

// ============================================
// GAME STATE
// ============================================
let activePainters = [];
let currentPainter = null;
let streak = 0;
let answered = false;
let popupWasWin = false;
let isLoading = false;
let paintingsCache = new Map();

function buildStreakDots() {
  const el = document.getElementById('streakDots');
  el.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    el.appendChild(d);
  }
}

function updateDots() {
  for (let i = 0; i < 10; i++) {
    const dot = document.getElementById('dot-' + i);
    if (dot) dot.className = 'dot' + (i < streak ? ' filled' : '');
  }
}

function pickChip(btn) {
  document.querySelectorAll('.col-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  streak = 0;
  updateDots();
  applyCollection(btn.dataset.col);
}

function applyCollection(collectionKey) {
  if (collectionKey === 'full') {
    activePainters = PAINTERS_MASTER;
  } else {
    activePainters = PAINTERS_MASTER.filter(p => p.tags && p.tags.includes(collectionKey));
  }
  
  if (activePainters.length < 2) {
    document.getElementById('choices').innerHTML = '<p style="padding:20px;color:#aaa;font-size:.65rem;letter-spacing:.2em;text-align:center;">Not enough painters in this collection.<br>Try "Full" for all painters.</p>';
    return;
  }
  
  // Clear cache when changing collections to get fresh paintings
  paintingsCache.clear();
  nextRound();
}

async function fetchPaintingsForPainter(painter) {
  if (paintingsCache.has(painter.id)) {
    return paintingsCache.get(painter.id);
  }
  
  const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=categorymembers&gcmtitle=Category:${encodeURIComponent(painter.category)}&gcmtype=file&gcmlimit=30&prop=imageinfo&iiprop=url|dimensions&iiurlwidth=800&format=json&origin=*`;
  
  try {
    const response = await fetch(url);
    const data = await response.json();
    
    if (!data.query || !data.query.pages) return [];
    
    const paintings = [];
    for (const page of Object.values(data.query.pages)) {
      if (page.imageinfo && page.imageinfo[0] && page.imageinfo[0].thumburl) {
        const info = page.imageinfo[0];
        if (info.width && info.height && info.width > 200 && info.height > 150) {
          paintings.push({
            title: page.title.replace(/^File:/, '').replace(/\.(jpg|jpeg|png)$/i, '').replace(/_/g, ' ').substring(0, 80),
            url: info.thumburl
          });
        }
      }
    }
    
    paintingsCache.set(painter.id, paintings);
    return paintings;
  } catch (error) {
    console.error(`Failed to fetch for ${painter.name}:`, error);
    return [];
  }
}

async function loadPainting(painter) {
  const canvas = document.getElementById('paintingCanvas');
  const ctx = canvas.getContext('2d');
  
  canvas.width = 700;
  canvas.height = 380;
  canvas.style.width = '100%';
  ctx.fillStyle = '#f8f8f8';
  ctx.fillRect(0, 0, 700, 380);
  ctx.fillStyle = '#ccc';
  ctx.font = '300 11px Montserrat, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Loading masterpiece...', 350, 195);
  
  const paintings = await fetchPaintingsForPainter(painter);
  
  if (!paintings || paintings.length === 0) {
    console.warn(`No paintings found for ${painter.name}`);
    return false;
  }
  
  const randomPainting = paintings[Math.floor(Math.random() * paintings.length)];
  window._currentPaintingTitle = randomPainting.title;
  
  return new Promise((resolve) => {
    const img = new Image();
    
    img.onload = function() {
      const col = document.getElementById('paintingCol');
      const availW = col ? col.clientWidth - 2 : window.innerWidth - 322;
      const availH = col ? col.clientHeight - 2 : window.innerHeight - 80;
      
      const scaleW = availW / img.width;
      const scaleH = availH / img.height;
      const scale = Math.min(scaleW, scaleH, 1);
      
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(true);
    };
    
    img.onerror = function() {
      console.warn(`Failed to load image for ${painter.name}`);
      const currentCache = paintingsCache.get(painter.id) || [];
      const newCache = currentCache.filter(p => p.url !== randomPainting.url);
      paintingsCache.set(painter.id, newCache);
      
      if (newCache.length > 0) {
        loadPainting(painter).then(resolve);
      } else {
        resolve(false);
      }
    };
    
    img.src = randomPainting.url;
  });
}

async function nextRound() {
  if (answered || isLoading) return;
  answered = false;
  
  if (activePainters.length < 2) {
    return;
  }
  
  isLoading = true;
  
  const randomIndex = Math.floor(Math.random() * activePainters.length);
  currentPainter = activePainters[randomIndex];
  
  const otherPainters = activePainters.filter(p => p.id !== currentPainter.id);
  const wrongOnes = [];
  const shuffled = [...otherPainters];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  for (let i = 0; i < Math.min(3, shuffled.length); i++) {
    wrongOnes.push(shuffled[i]);
  }
  
  const options = [...wrongOnes, currentPainter];
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }
  
  const success = await loadPainting(currentPainter);
  
  if (!success) {
    isLoading = false;
    nextRound();
    return;
  }
  
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach((p, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="btn-num">${idx + 1}</span>${p.name}`;
    btn.onclick = () => answer(btn, p);
    choicesEl.appendChild(btn);
  });
  
  isLoading = false;
}

function answer(btn, painter) {
  if (answered) return;
  answered = true;
  
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);
  
  const correct = painter.id === currentPainter.id;
  
  if (correct) {
    btn.classList.add('correct');
    streak++;
    updateDots();
    if (streak >= 10) {
      setTimeout(() => showPopup(true), 500);
    } else {
      setTimeout(() => {
        answered = false;
        nextRound();
      }, 800);
    }
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.textContent === currentPainter.name) b.classList.add('correct');
    });
    streak = 0;
    updateDots();
    setTimeout(() => showPopup(false), 500);
  }
}

function showPopup(won) {
  popupWasWin = won;
  const emoji = document.getElementById('popupEmoji');
  const title = document.getElementById('popupTitle');
  const info = document.getElementById('popupInfo');
  const popupBtn = document.getElementById('popupBtn');
  
  if (won) {
    emoji.textContent = '✦';
    title.textContent = '10 in a Row';
    info.innerHTML = 'You correctly identified ten paintings in a row.<br>Exceptional.';
    popupBtn.textContent = 'Continue';
  } else {
    emoji.textContent = '';
    title.textContent = currentPainter.name;
    const line1 = [currentPainter.nationality ? currentPainter.nationality + ' Painter' : '', (currentPainter.born && currentPainter.died) ? currentPainter.born + ' – ' + currentPainter.died : ''].filter(Boolean).join('  ·  ');
    const paintingLine = window._currentPaintingTitle ? '<br>Painting: ' + window._currentPaintingTitle : '';
    info.innerHTML = line1 + (paintingLine ? paintingLine : '');
    popupBtn.textContent = 'Try Again';
  }
  
  document.getElementById('overlay').classList.add('show');
  document.getElementById('popup').className = won ? 'win' : 'loss';
}

function closePopup() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('popup').className = '';
  if (popupWasWin) { streak = 0; updateDots(); }
  answered = false;
  nextRound();
}

// ── KEYBOARD: 1-4 select, Enter confirm/close ──────────────────────────────
let keySelected = -1; // index of highlighted choice

document.addEventListener('keydown', e => {
  // Existing anti-cheat keys (F12 etc.) handled above — skip those
  const overlay = document.getElementById('overlay');
  const isOpen  = overlay.classList.contains('show');

  if (isOpen) {
    if (e.key === 'Enter') { e.preventDefault(); closePopup(); }
    return;
  }

  if (answered) return;

  const btns = Array.from(document.querySelectorAll('.choice-btn:not(:disabled)'));
  if (!btns.length) return;

  if (['1','2','3','4'].includes(e.key)) {
    e.preventDefault();
    const idx = parseInt(e.key) - 1;
    if (idx < btns.length) {
      // Flash highlight
      btns.forEach(b => b.classList.remove('key-flash'));
      btns[idx].classList.add('key-flash');
      keySelected = idx;
      setTimeout(() => btns[idx]?.classList.remove('key-flash'), 180);
    }
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    if (keySelected >= 0 && keySelected < btns.length) {
      btns[keySelected].click();
      keySelected = -1;
    }
  }
});

// ── TITLE SWITCHER ────────────────────────────────────────────────────────
const switcher  = document.getElementById('titleSwitcher');
const dropdown  = document.getElementById('titleDropdown');
const wordArt   = document.getElementById('wordArt');
const wordThought = document.getElementById('wordThought');
let dropOpen = false;

function openDrop() {
  dropOpen = true;
  dropdown.classList.add('open');
  // Animate "Art" → "Thought"
  wordArt.style.opacity = '0';
  wordArt.style.transform = 'translateY(-6px)';
  wordThought.style.opacity = '1';
  wordThought.style.transform = 'translateY(0)';
  // Dynamically size the parent to fit "THOUGHT" width
  switcher.style.minWidth = wordThought.scrollWidth + 'px';
}

function closeDrop() {
  dropOpen = false;
  dropdown.classList.remove('open');
  wordArt.style.opacity = '1';
  wordArt.style.transform = 'translateY(0)';
  wordThought.style.opacity = '0';
  wordThought.style.transform = 'translateY(6px)';
  switcher.style.minWidth = '';
}

switcher.addEventListener('mouseenter', openDrop);
switcher.addEventListener('mouseleave', closeDrop);
switcher.addEventListener('focus', openDrop);
switcher.addEventListener('blur', e => { if (!switcher.contains(e.relatedTarget)) closeDrop(); });

function stayOnArt() { closeDrop(); }

function buildCollectionButtons() {
  const collections = getUniqueCollections();
  const container = document.getElementById('collectionBtns');
  container.innerHTML = '';
  collections.forEach(col => {
    const btn = document.createElement('button');
    btn.className = 'col-chip';
    if (col === 'popular') btn.classList.add('active');
    btn.textContent = col.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    btn.dataset.col = col;
    btn.onclick = () => pickChip(btn);
    container.appendChild(btn);
  });
}

function init() {
  buildStreakDots();
  buildCollectionButtons();
  applyCollection('popular');
}

init();
</script>
